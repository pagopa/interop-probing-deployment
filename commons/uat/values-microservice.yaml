namespace: "uat"
techStack: "nodejs"

deployment:
  enableRolloutAnnotations: true
  replicas: 0
  env:
    LOG_LEVEL: "info"
  image:
    repositoryPrefix: "774300547186.dkr.ecr.eu-south-1.amazonaws.com"
    imagePullPolicy: Always
    tag: $IMAGE_TAG_PLACEHOLDER
    digest: $IMAGE_DIGEST_PLACEHOLDER
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

local:
  awsAccountId: "010158505074"
  env: "uat"
